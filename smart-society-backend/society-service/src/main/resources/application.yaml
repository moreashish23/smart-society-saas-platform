server:
  port: 8082

spring:
  application:
    name: society-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_society_society_db
    username: ${DB_USERNAME_PG:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: SocietyHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000

app:
  jwt:
    secret: ${JWT_SECRET}

  services:
    audit-service-url: ${AUDIT_SERVICE_URL:http://localhost:8088}
    notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
    auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.smartsociety.society: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [SOCIETY] %logger{36} - %msg%n"