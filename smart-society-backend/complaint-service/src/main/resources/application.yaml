server:
  port: 8084

spring:
  application:
    name: complaint-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_society_complaint_db
    username: ${DB_USERNAME_PG:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      pool-name: ComplaintHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

app:
  services:
    vendor-service-url: ${VENDOR_SERVICE_URL:http://localhost:8085}
    notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
    audit-service-url: ${AUDIT_SERVICE_URL:http://localhost:8088}

  sla:
    critical-hours: 4
    high-hours: 24
    medium-hours: 48
    low-hours: 72

  escalation:
    check-interval-cron: "0 */30 * * * *"   # every 30 minutes

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.smartsociety.complaint: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [COMPLAINT] %logger{36} - %msg%n"