server:
  port: 8088

spring:
  application:
    name: audit-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_society_audit_db
    username: ${DB_USERNAME_PG:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: AuditHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

app:
  audit:
    retention-days: 365      # auto-purge logs older than 1 year

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.smartsociety.audit: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [AUDIT] %logger{36} - %msg%n"