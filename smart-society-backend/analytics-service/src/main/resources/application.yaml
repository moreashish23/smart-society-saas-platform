server:
  port: 8087

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smart_society_analytics_db
    username: ${DB_USERNAME_PG:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: AnalyticsHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 15000

app:
  jwt:
    secret: ${JWT_SECRET}

  services:
    complaint-service-url: ${COMPLAINT_SERVICE_URL:http://localhost:8084}
    vendor-service-url:    ${VENDOR_SERVICE_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

logging:
  level:
    com.smartsociety.analytics: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [ANALYTICS] %logger{36} - %msg%n"